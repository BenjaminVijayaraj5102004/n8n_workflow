<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen 3.0 Pro - AI Agent</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --bot-bubble: #1e293b;
            --user-bubble: #4f46e5;
        }

        body {
            background: var(--bg);
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .chat-container {
            width: 450px;
            height: 700px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .clear-btn {
            position: absolute;
            right: 20px;
            top: 35px;
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #94a3b8;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .clear-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 8px;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
            border: 2px solid var(--primary);
            object-fit: cover;
        }

        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .msg {
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.6;
            max-width: 80%;
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bot {
            background: var(--bot-bubble);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user {
            background: var(--user-bubble);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }

        .typing {
            padding: 0 30px 20px;
            font-size: 12px;
            color: #6366f1;
            display: none;
            gap: 4px;
            font-weight: 500;
        }

        .input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 12px;
            border-bottom-left-radius: 32px;
            border-bottom-right-radius: 32px;
        }

        input {
            flex: 1;
            background: #111827;
            border: 1px solid #374151;
            padding: 14px 20px;
            border-radius: 16px;
            color: white;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        button#send-btn {
            background: var(--primary);
            border: none;
            padding: 0 24px;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        .chat-window::-webkit-scrollbar {
            width: 5px;
        }

        .chat-window::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>

            <div style="font-weight: 700; font-size: 16px;">QWEN 3.0 AGENT</div>
            <div style="font-size: 11px; color: #6366f1; margin-top: 4px;">● ONLINE</div>
        </div>

        <div id="chat-window" class="chat-window">
            <div class="msg bot">System ready. State your request.</div>
        </div>

        <div id="typing" class="typing">Agent is analyzing...</div>

        <form id="chat-form" class="input-area">
            <input type="text" id="user-input" placeholder="Type message..." autocomplete="off" required>
            <button type="submit" id="send-btn">SEND</button>
        </form>
    </div>

    <script>
        const chatForm = document.getElementById('chat-form');
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const typing = document.getElementById('typing');

        function addMessage(text, side) {
            const div = document.createElement('div');
            div.className = `msg ${side}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function clearChat() {
            chatWindow.innerHTML = '<div class="msg bot">Memory cleared. How can I help?</div>';
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            userInput.value = '';
            typing.style.display = 'block';

            try {
                const response = await fetch('/send_message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatInput: message, sessionId: "ben_001" })
                });

                const data = await response.json();

                // Extract raw reply
                let reply = data.output || data.text || data.response || "No response received.";

                // --- THE CLEANER LOGIC ---
                // If the reply contains a </think> tag, only take everything AFTER it
                if (reply.includes("</think>")) {
                    reply = reply.split("</think>").pop().trim();
                } else if (reply.includes("<think>")) {
                    // If it started thinking but didn't finish, show nothing or a default
                    reply = "Processing...";
                }

                addMessage(reply, 'bot');

            } catch (err) {
                addMessage("Error connecting to server.", 'bot');
            } finally {
                typing.style.display = 'none';
            }
        };
    </script>
</body>
